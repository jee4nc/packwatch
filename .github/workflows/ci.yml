name: CI

on:
  push:
    branches: [main, "release-*"]
  pull_request:
    branches: [main, "release-*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - run: go test -race -v ./...
