name: CI

on:
  push:
    branches: [main, "release-*"]
  pull_request:
    branches: [main, "release-*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - run: go test -race -v ./...
